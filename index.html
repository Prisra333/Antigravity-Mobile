<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Antigravity Mobile - Live MVP</title>
<style>
  :root { --bg: #1e1f22; --panel: #2b2d30; --text: #dfe1e5; --accent: #8ab4f8; }
  body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100dvh; }
  header { padding: 12px; background: var(--panel); border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
  .api-key-input { background: #111; border: 1px solid #555; color: #fff; padding: 4px 8px; border-radius: 4px; width: 130px; font-size: 12px; }
  .container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  
  /* エージェント対話エリア */
  .chat-area { height: 40%; overflow-y: auto; padding: 16px; border-bottom: 1px solid #444; }
  .message { margin-bottom: 12px; font-size: 14px; line-height: 1.5; }
  .message.user { color: var(--accent); text-align: right; }
  .message.agent { color: #aaa; }
  
  /* Artifact（プレビュー）エリア */
  .preview-area { height: 60%; background: #fff; display: flex; flex-direction: column; }
  .preview-header { background: #333; padding: 6px 12px; font-size: 12px; color: #ccc; display: flex; justify-content: space-between; }
  iframe { border: none; width: 100%; height: 100%; background: #fff; }

  /* 入力エリア */
  .input-area { padding: 12px; background: var(--panel); display: flex; gap: 8px; border-top: 1px solid #444; }
  .input-area input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid #555; background: var(--bg); color: #fff; outline: none; font-size: 14px; }
  .input-area button { background: var(--accent); color: #000; border: none; padding: 0 16px; border-radius: 20px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>

<header>
  <strong style="color:var(--accent);">Antigravity <span>Mobile</span></strong>
  <!-- Google AI Studioで取得したAPIキーを入力 -->
  <input type="password" id="apiKey" class="api-key-input" placeholder="Gemini API Key">
</header>

<div class="container">
  <!-- チャットエリア -->
  <div class="chat-area" id="chat">
    <div class="message agent">✨ エージェント：右上からGeminiのAPIキーを入力し、作りたいアプリを指示してください。<br>（例：「スマホ用のおしゃれなストップウォッチを作って」）</div>
  </div>

  <!-- プレビュー（Artifact）エリア -->
  <div class="preview-area">
    <div class="preview-header">
      <span>Live Artifact Preview</span>
      <span id="status">待機中...</span>
    </div>
    <iframe id="preview"></iframe>
  </div>
</div>

<div class="input-area">
  <input type="text" id="prompt" placeholder="アプリの要件を入力..." onkeypress="if(event.key === 'Enter') generateApp()">
  <button onclick="generateApp()">送信</button>
</div>

<script>
  // APIキーをローカルストレージに保存（次回以降の入力省略）
  const keyInput = document.getElementById('apiKey');
  keyInput.value = localStorage.getItem('gemini_api_key') || '';
  keyInput.addEventListener('change', () => localStorage.setItem('gemini_api_key', keyInput.value));

  async function generateApp() {
    const prompt = document.getElementById('prompt').value;
    const apiKey = keyInput.value;
    if (!prompt || !apiKey) return alert("APIキーとプロンプトを入力してください。\nAPIキーは aistudio.google.com で無料取得できます。");

    const chat = document.getElementById('chat');
    chat.innerHTML += `<div class="message user">${prompt}</div>`;
    document.getElementById('prompt').value = '';
    
    document.getElementById('status').innerText = '🔄 コーディング中...';
    const loadingId = 'loading-' + Date.now();
    chat.innerHTML += `<div class="message agent" id="${loadingId}">✨ エージェント：要件を解釈し、自律コーディングを実行しています...</div>`;
    chat.scrollTop = chat.scrollHeight;

    try {
      // Gemini 1.5 Flash APIを呼び出し（高速なのでリアルタイムプレビューに最適）
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts:[{ text: `あなたはGoogle Antigravityの自律エージェントです。ユーザーの要望に基づき、1つのHTMLファイルで完結するWebアプリ（HTML/CSS/JSの一体型）を作成してください。スマートフォンで使いやすいモダンなデザインにすること。コード以外の説明は不要です。出力は必ず \`\`\`html と \`\`\` で囲んでください。\n\n要望: ${prompt}` }] }]
        })
      });

      const data = await response.json();
      const text = data.candidates[0].content.parts[0].text;
      
      // MarkdownのコードブロックからHTMLコードだけを抽出
      const match = text.match(/```(?:html)?\n([\s\S]*?)\n```/i);
      const code = match ? match[1] : text.replace(/```/g, '');

      // 下部のiframeに生成されたコードを流し込み、即時実行する
      const iframe = document.getElementById('preview');
      iframe.srcdoc = code;

      document.getElementById(loadingId).innerText = '✨ エージェント：Artifactを生成しました。下のプレビューで実際の動作を確認してください。追加の修正があれば指示してください。';
      document.getElementById('status').innerText = '✅ 完了';
      chat.scrollTop = chat.scrollHeight;
      
    } catch (error) {
      document.getElementById(loadingId).innerText = '❌ エラーが発生しました。APIキーが正しいか確認してください。';
      document.getElementById('status').innerText = 'エラー';
      console.error(error);
    }
  }
</script>

</body>
</html>
