<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Antigravity Mobile - Live MVP</title>
<style>
  :root { --bg: #1e1f22; --panel: #2b2d30; --text: #dfe1e5; --accent: #8ab4f8; }
  body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100dvh; }
  header { padding: 10px 12px; background: var(--panel); border-bottom: 1px solid #444; display: flex; flex-direction: column; gap: 8px; }
  .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
  .api-area { display: flex; gap: 5px; width: 100%; }
  .api-key-input { flex: 1; background: #111; border: 1px solid #555; color: #fff; padding: 6px; border-radius: 4px; font-size: 12px; }
  .save-btn { background: #444; color: #fff; border: none; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
  
  .container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-area { height: 40%; overflow-y: auto; padding: 16px; border-bottom: 1px solid #444; background: rgba(0,0,0,0.1); }
  .message { margin-bottom: 12px; font-size: 14px; line-height: 1.5; padding: 8px 12px; border-radius: 10px; max-width: 85%; }
  .message.user { background: var(--accent); color: #000; align-self: flex-end; margin-left: auto; }
  .message.agent { background: #333; color: #eee; align-self: flex-start; }
  
  .preview-area { height: 60%; background: #fff; display: flex; flex-direction: column; position: relative; }
  .preview-header { background: #333; padding: 6px 12px; font-size: 11px; color: #ccc; display: flex; justify-content: space-between; align-items: center; }
  iframe { border: none; width: 100%; height: 100%; background: #fff; }

  .input-area { padding: 12px; background: var(--panel); display: flex; gap: 8px; border-top: 1px solid #444; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
  .input-area input { flex: 1; padding: 12px 16px; border-radius: 25px; border: 1px solid #555; background: var(--bg); color: #fff; outline: none; font-size: 14px; }
  .input-area button { background: var(--accent); color: #000; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <strong style="color:var(--accent);">Antigravity <span style="color:#fff;">Mobile</span></strong>
    <span id="status" style="font-size:10px; color:#888;">待機中</span>
  </div>
  <div class="api-area">
    <input type="password" id="apiKey" class="api-key-input" placeholder="Gemini API Keyを貼り付け">
    <button class="save-btn" onclick="saveKey()">保存</button>
  </div>
</header>

<div class="container">
  <div class="chat-area" id="chat">
    <div class="message agent">✨ エージェント：APIキーを保存してから、作りたいアプリを指示してください。</div>
  </div>

  <div class="preview-area">
    <div class="preview-header">
      <span>Preview (Artifact)</span>
      <button onclick="refreshPreview()" style="background:none; border:none; color:var(--accent); font-size:10px;">再読込</button>
    </div>
    <iframe id="preview"></iframe>
  </div>
</div>

<div class="input-area">
  <input type="text" id="prompt" placeholder="例：おみくじアプリを作って" onkeypress="if(event.key === 'Enter') generateApp()">
  <button onclick="generateApp()">送信</button>
</div>

<script>
  const keyInput = document.getElementById('apiKey');
  const previewIframe = document.getElementById('preview');

  // 保存されているキーを読み込み
  window.onload = () => {
    const savedKey = localStorage.getItem('gemini_api_key');
    if (savedKey) {
      keyInput.value = savedKey;
      addMessage('agent', '✅ APIキーが読み込まれました。準備完了です！');
    }
  };

  function saveKey() {
    if (keyInput.value.trim() === "") {
      alert("キーを入力してください");
      return;
    }
    localStorage.setItem('gemini_api_key', keyInput.value.trim());
    alert("APIキーをブラウザに保存しました。");
  }

  function addMessage(role, text) {
    const chat = document.getElementById('chat');
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
    return msg;
  }

  function refreshPreview() {
    const code = previewIframe.getAttribute('data-last-code');
    if (code) previewIframe.srcdoc = code;
  }

    addMessage('user', prompt);
